{% extends "base.html" %}
{% block title %}Mesaj Oluştur{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <div>
        <h4><i class="bi bi-pencil-fill me-2 text-primary"></i>Yeni Mesaj</h4>
        <p class="text-muted mb-0">Öğretmen veya öğrenciye mesaj gönderin</p>
    </div>
    <a href="{{ url_for('messages.inbox') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Geri
    </a>
</div>

<div class="card" style="max-width:600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Alıcı</label>
                <select name="receiver_id" class="form-select" required>
                    <option value="">-- Alıcı Seçin --</option>
                    {% for r in recipients %}
                    <option value="{{ r.id }}" {% if preselect and preselect == r.id %}selected{% endif %}>
                        {{ r.full_name }} ({{ 'Öğretmen' if r.role == 'teacher' else ('Yönetici' if r.role == 'admin' else 'Öğrenci') }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Konu</label>
                <input type="text" name="subject" class="form-control" required placeholder="Mesaj konusu">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Mesaj</label>
                <textarea name="body" class="form-control" rows="6" required placeholder="Mesajınızı buraya yazın..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-send-fill me-1"></i>Gönder
            </button>
        </form>
    </div>
</div>
{% endblock %}
