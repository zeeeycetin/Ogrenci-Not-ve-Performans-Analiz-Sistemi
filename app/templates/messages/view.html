{% extends "base.html" %}
{% block title %}Mesaj{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <div>
        <h4><i class="bi bi-envelope-open-fill me-2 text-primary"></i>Mesaj</h4>
    </div>
    <div class="d-flex gap-2">
        <a href="{{ url_for('messages.compose') }}?reply_to={{ msg.id }}" class="btn btn-outline-primary btn-sm">
            <i class="bi bi-reply-fill me-1"></i>Yanıtla
        </a>
        <form method="POST" action="{{ url_for('messages.delete_message', msg_id=msg.id) }}" class="d-inline"
              onsubmit="return confirm('Mesajı silmek istediğinize emin misiniz?')">
            <button class="btn btn-outline-danger btn-sm"><i class="bi bi-trash-fill me-1"></i>Sil</button>
        </form>
        <a href="{{ url_for('messages.inbox') }}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Geri
        </a>
    </div>
</div>

<div class="card" style="max-width:700px;">
    <div class="card-body">
        <div class="d-flex align-items-center gap-3 mb-3">
            <div class="sp-avatar" style="width:44px;height:44px;">{{ msg.sender_name[0] | upper if msg.sender_name else '?' }}</div>
            <div>
                <div class="fw-bold">{{ msg.sender_name or 'Bilinmiyor' }}</div>
                <div class="text-muted small">{{ msg.created_at | fmt_datetime }}</div>
            </div>
        </div>
        <h5 class="fw-bold border-bottom pb-2 mb-3">{{ msg.subject }}</h5>
        <p class="mb-0" style="line-height:1.8;white-space:pre-wrap;">{{ msg.body }}</p>
    </div>
</div>
{% endblock %}
